services:
  db:
    image: postgres:17-alpine
    container_name: liburwan-db
    env_file:
      - ./backend-liburwan/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-liburwan}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-liburwan}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend-liburwan
      dockerfile: Dockerfile
    container_name: liburwan-backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend-liburwan/.env
    environment:
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-user}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-liburwan}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend-liburwan
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: liburwan-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
